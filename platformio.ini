; ============================================================================
;  HeavenlyPointer - Stack-chan Satellite Tracker firmware
;  Target: M5Stack CoreS3 (ESP32-S3) - the brain inside Stack-chan
; ============================================================================
[platformio]
default_envs = stackchan-cores3

[env:stackchan-cores3]
; StackChan-BSP needs arduino-esp32 3.x (ESP-IDF 5.x) -> use the pioarduino fork.
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board     = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_speed  = 1500000

; 16MB flash layout with a LittleFS data partition for TLE storage
board_build.partitions = partitions_16MB.csv
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM

lib_deps =
    m5stack/M5Unified                                ; display, touch, RTC, IMU
    https://github.com/m5stack/StackChan-BSP.git     ; body: serial-bus servos, RGB, power
    bblanchon/ArduinoJson @ ^7                        ; geolocation JSON parsing
    https://github.com/Hopperpop/Sgp4-Library.git    ; SGP4 orbital propagator
